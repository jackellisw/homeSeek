services:
  homeseek:
    build: .
    container_name: homeseek
    ports:
      - "4000:4000"
    env_file:
      - path: ./.env
        required: false
    environment:
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      SQLITE_PATH: "/data/homeseek.sqlite"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - homeseek-data:/data
    restart: unless-stopped

volumes:
  homeseek-data:
