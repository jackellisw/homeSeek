services:
  homeseek:
    build: .
    container_name: homeseek
    ports:
      - "4000:4000"
    environment:
      AUTH_SECRET: "${AUTH_SECRET:-replace-with-a-long-random-string}"
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:-homeseek}"
      PLEX_BASE_URL: "${PLEX_BASE_URL:-http://host.docker.internal:32400}"
      PLEX_TOKEN: "${PLEX_TOKEN:-}"
      SQLITE_PATH: "/data/homeseek.sqlite"
    volumes:
      - homeseek-data:/data
    restart: unless-stopped

volumes:
  homeseek-data:
